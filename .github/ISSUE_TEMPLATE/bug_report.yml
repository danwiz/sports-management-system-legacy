name: Bug report
description: Report incorrect behavior in the modern implementation
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Legacy specification or UAT reference
