name: Bootstrap verified source archive

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-import.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download verified v11 source archive
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            'https://drive.usercontent.google.com/download?id=1b-dLE5tD5m9mE7xLrRBsFQEe3aJLXZxW&export=download&confirm=t' \
            --output /tmp/sports-management-system-legacy-v11.zip
          echo '8d2416fae7fdd091cfbf61a78edd91eac6b927fe1963224b8b4fd14e5195598d  /tmp/sports-management-system-legacy-v11.zip' | sha256sum --check --strict

      - name: Extract source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/sms-import
          mkdir -p /tmp/sms-import
          unzip -q /tmp/sports-management-system-legacy-v11.zip -d /tmp/sms-import
          test -f /tmp/sms-import/sports-management-system-legacy/README.md
          test -f /tmp/sms-import/sports-management-system-legacy/modern/CMakeLists.txt

      - name: Replace bootstrap repository with verified source
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete --exclude='.git/' \
            /tmp/sms-import/sports-management-system-legacy/ ./

      - name: Commit imported source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Dane Wisdom'
          git config user.email 'danewisdom@gmail.com'
          git add -A
          git commit -m 'Publish verified Sports Management System modernization source'
          git push origin main
