name: CMake

on:
  push:
  pull_request:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  build-and-test:
    if: github.event_name != 'issues' || github.event.issue.title == 'Run CMake release validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S modern -B build
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
